    faq:
      - question: 徐享（享哥）提供哪些主要服務？
        answer: 提供 AI 應用規劃、n8n 自動化工作設計、電商社群行銷策略與 AI 轉型顧問諮詢，協助中小企業把 AI 導入實際營運與成長流程。
      - question: 哪些企業適合找徐享合作？
        answer: 適合想導入 AI 內容產製、行銷流程自動化、客服問答優化、電商轉換提升與內部數位轉型的中小企業、個人品牌與教育型團隊。
      - question: 如何開始合作與聯絡？
        answer: 可透過 Email 或 LINE 說明需求與現況，先安排初步診斷，再依目標提供合作提案、時程與報價。

  service:
    description: 提供 AI 應用規劃、n8n 自動化工作、電商社群行銷與 AI 轉型顧問服務，協助中小企業把 AI 導入實際營運。
    faq:
      - question: 徐享（享哥）提供哪些主要服務？
        answer: 提供 AI 應用規劃、n8n 自動化工作設計、電商社群行銷策略與 AI 轉型顧問諮詢，協助企業把 AI 與行銷能力整合到可落地的營運流程中。
      - question: n8n 自動化工作可以協助哪些流程？
        answer: 可串接表單、LINE、Email、CRM、內容排程與資料整理，建立從蒐集、生成、通知到追蹤的自動化流程，降低重複作業與人力成本。
      - question: AI 應用規劃適合哪些企業或品牌？
        answer: 適合想導入 AI 內容產製、內部 SOP、客服輔助、知識庫、行銷自動化或電商營運優化的中小企業、教育單位與個人品牌。
      - question: 顧問服務可以線上進行嗎？
        answer: 可以，提供 Google Meet 或 Zoom 線上會議，也可依合作需求安排實體會議與工作坊。
      - question: 可以安排企業內訓或客製工作坊嗎？
        answer: 可以，能依產業、部門角色與目標，設計 AI 導入、n8n 流程、自媒體內容與電商行銷相關課程。
      - question: 合作流程與報價方式為何？
        answer: 先蒐集需求與現況，進行初步診斷後提供建議方案、執行時程與報價；單次顧問、企業內訓與自動化專案可依需求客製。

